name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance + OIDC Trusted Publishing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run test:all
      # `prepublishOnly` in package.json re-runs build + tests, so we
      # don't need a separate build step here. Uses Trusted Publishing
      # via OIDC; no NPM_TOKEN is needed.
      #
      # Pick the dist-tag from the version suffix so a pre-release never
      # accidentally becomes @latest: `-alpha` → alpha, `-beta` → beta,
      # `-rc` → rc, other pre-releases → next, release → latest.
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-alpha*) TAG=alpha ;;
            *-beta*)  TAG=beta ;;
            *-rc*)    TAG=rc ;;
            *-*)      TAG=next ;;
            *)        TAG=latest ;;
          esac
          echo "Publishing $VERSION to dist-tag $TAG"
          npm publish --provenance --access public --tag "$TAG"
