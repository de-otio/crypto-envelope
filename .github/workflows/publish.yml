name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to publish (e.g. v0.2.0-alpha.1)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write # required for npm provenance + OIDC Trusted Publishing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      # Build BEFORE test:all — test/bundler-smoke.test.ts imports from
      # ./dist and will fail if the build didn't run. prepublishOnly also
      # runs build but that's too late for the test step.
      - run: npm run build
      - run: npm run test:all
      # Uses Trusted Publishing via OIDC; no NPM_TOKEN is needed.
      #
      # Pick the dist-tag from the version suffix so a pre-release never
      # accidentally becomes @latest: `-alpha` → alpha, `-beta` → beta,
      # `-rc` → rc, other pre-releases → next, release → latest.
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-alpha*) TAG=alpha ;;
            *-beta*)  TAG=beta ;;
            *-rc*)    TAG=rc ;;
            *-*)      TAG=next ;;
            *)        TAG=latest ;;
          esac
          echo "Publishing $VERSION to dist-tag $TAG"
          npm publish --provenance --access public --tag "$TAG"
