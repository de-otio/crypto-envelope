# =============================================================================
# Secrets & Credentials Scanner
# Catches hardcoded API keys, passwords, tokens before they get merged
# Runs gitleaks + AI analysis for context-aware detection
# =============================================================================

name: "🔑 Secrets Scanner"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  secrets-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional for OSS

      - name: Scan for AWS patterns
        run: |
          echo "## AWS Credential Patterns" > secrets-report.md
          # AWS Access Keys
          grep -rn "AKIA[0-9A-Z]\{16\}" --include="*.ts" --include="*.js" --include="*.py" --include="*.env" --include="*.yml" --include="*.yaml" . >> secrets-report.md 2>/dev/null || echo "No AWS keys found" >> secrets-report.md
          # Generic secrets patterns
          echo -e "\n## Potential Hardcoded Secrets" >> secrets-report.md
          grep -rn -i "password\s*=\s*['\"]" --include="*.ts" --include="*.js" --include="*.py" . >> secrets-report.md 2>/dev/null || true
          grep -rn -i "secret\s*=\s*['\"]" --include="*.ts" --include="*.js" --include="*.py" . >> secrets-report.md 2>/dev/null || true
          grep -rn -i "api_key\s*=\s*['\"]" --include="*.ts" --include="*.js" --include="*.py" . >> secrets-report.md 2>/dev/null || true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('secrets-report.md')) {
              const report = fs.readFileSync('secrets-report.md', 'utf8');
              if (report.includes('AKIA') || report.includes('password') || report.includes('secret')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `## 🔑 Secrets Scan Warning\n\nPotential credentials detected in this PR:\n\n${report}\n\n> Use environment variables or AWS Secrets Manager instead.`
                });
              }
            }
