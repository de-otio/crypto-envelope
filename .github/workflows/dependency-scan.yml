# =============================================================================
# Dependency Security Scan
# Runs on PRs that change package files + weekly schedule
# Combines traditional tooling (npm audit, pip audit) with AI triage
# =============================================================================

name: "📦 Dependency Security Scan"

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - "requirements.txt"
      - "Pipfile.lock"
      - "poetry.lock"
      - "Cargo.lock"
      - "go.sum"
  schedule:
    - cron: "0 8 * * 3"  # Wednesday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js dependencies ──────────────────────────────────
      - name: Check for Node.js project
        id: check-node
        run: echo "exists=$(test -f package.json && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.check-node.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit
        if: steps.check-node.outputs.exists == 'true'
        continue-on-error: true
        run: |
          npm install --package-lock-only 2>/dev/null || true
          npm audit --json > npm-audit.json 2>/dev/null || true
          echo "### npm audit results" > dep-report.md
          npm audit 2>/dev/null >> dep-report.md || echo "No vulnerabilities found" >> dep-report.md

      # ── Python dependencies ───────────────────────────────────
      - name: Check for Python project
        id: check-python
        run: echo "exists=$(test -f requirements.txt -o -f Pipfile.lock -o -f poetry.lock && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: pip-audit
        if: steps.check-python.outputs.exists == 'true'
        continue-on-error: true
        run: |
          pip install pip-audit 2>/dev/null
          echo -e "\n### pip-audit results" >> dep-report.md
          pip-audit -r requirements.txt 2>/dev/null >> dep-report.md || echo "No vulnerabilities found" >> dep-report.md

      # ── AI triage of findings ─────────────────────────────────
      - name: Check API key is configured
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set. Add it under repo Settings → Secrets → Actions."
            exit 1
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: AI triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -f dep-report.md ]; then
            claude --model claude-opus-4-6 --max-turns 5 --print <<PROMPT > triaged-report.md
          Review the following dependency vulnerability report. For each finding:
          1. Assess real-world exploitability in a typical web application context
          2. Determine if it's actually reachable in this codebase
          3. Recommend: "Upgrade immediately", "Upgrade soon", or "Low risk — monitor"
          4. If an upgrade isn't available, suggest a workaround

          Focus on actionable findings. Skip informational/low-severity noise.

          $(cat dep-report.md)
          PROMPT
          fi

      - name: Post results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            if (fs.existsSync('triaged-report.md')) {
              report = fs.readFileSync('triaged-report.md', 'utf8');
            } else {
              report = 'No dependency vulnerabilities detected.';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 📦 Dependency Security Report\n\n${report}`
            });

      - name: Create issue (scheduled runs)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = 'No dependency vulnerabilities detected.';
            if (fs.existsSync('triaged-report.md')) {
              report = fs.readFileSync('triaged-report.md', 'utf8');
            }
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📦 Dependency Audit — ${today}`,
              body: report,
              labels: ['security', 'dependencies', 'automated']
            });
