# =============================================================================
# AI-Powered Security Review on Every PR
# Uses Anthropic's official claude-code-security-review action via AWS Bedrock
# Docs: https://github.com/anthropics/claude-code-security-review
# =============================================================================

name: "🔒 AI Security Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Prevent parallel reviews on the same PR
concurrency:
  group: security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write  # Required for OIDC auth to AWS Bedrock

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::284064533851:role/github-ci-bedrock
          aws-region: eu-central-1

      - name: Run Claude Security Review
        uses: anthropics/claude-code-security-review@0c6a49f1fa56a1d472575da86a94dbc1edb78eda # main
        with:
          use_bedrock: true
          aws_region: eu-central-1
          model: "eu.anthropic.claude-opus-4-6-20251101-v1:0"
          # Optional: set to true to re-scan every commit (more thorough but noisier)
          direct_push: false
