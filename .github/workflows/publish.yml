name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm provenance + OIDC Trusted Publishing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run test:all
      # `prepublishOnly` in package.json re-runs build + tests, so we
      # don't need a separate build step here. Uses Trusted Publishing
      # via OIDC. Configure the binding at:
      # https://www.npmjs.com/package/@de-otio/crypto-envelope/access
      # so no NPM_TOKEN is needed.
      - run: npm publish --provenance --access public
