# =============================================================================
# AI-Powered Security Review on Every PR
# Runs Claude Code via AWS Bedrock against the PR diff
# Blocks merge on Critical or High findings
# =============================================================================

name: "🔒 AI Security Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Prevent parallel reviews on the same PR
concurrency:
  group: security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write  # Required for OIDC auth to AWS Bedrock

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::284064533851:role/github-ci-bedrock
          aws-region: eu-central-1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          echo "Diff: $(wc -l < pr.diff) lines across $(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l) files"

      - name: Run security review
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_REGION: eu-central-1
        run: |
          claude --model eu.anthropic.claude-opus-4-6-v1 --max-turns 10 --print <<'PROMPT' > review-report.md
          You are a senior application security engineer reviewing a pull request to a
          cryptographic library. Your review must block unsafe changes from merging.

          Steps:
          1. Read CLAUDE.md — it contains the review priorities and severity scale.
          2. Read pr.diff — the full PR diff to review.
          3. For each finding, state:
             - Severity (Critical / High / Medium / Low per CLAUDE.md scale)
             - File and line number
             - What the issue is, in plain terms
             - The mistake class (cite the priority number from CLAUDE.md)
             - Concrete fix
          4. Output a summary table of all findings.
          5. On the final line, output exactly one of:
             VERDICT: BLOCK
             VERDICT: PASS

          Use VERDICT: BLOCK if there are any Critical or High findings.
          Use VERDICT: PASS only if there are no Critical or High findings.
          Do not invent issues. If there is nothing to flag, say so and output VERDICT: PASS.
          PROMPT

      - name: Enforce verdict
        run: |
          if [ ! -s review-report.md ]; then
            echo "::error::review-report.md is empty — claude failed to produce output"
            exit 1
          fi

          if grep -q "^VERDICT: BLOCK$" review-report.md; then
            echo "::error::Security review found Critical or High findings — merge blocked. See PR comment for details."
            exit 1
          elif grep -q "^VERDICT: PASS$" review-report.md; then
            echo "Security review passed — no Critical or High findings."
          else
            echo "::error::No VERDICT line found in review output — treating as failure."
            cat review-report.md
            exit 1
          fi

      - name: Post review comment
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('review-report.md')) return;
            const report = fs.readFileSync('review-report.md', 'utf8').trim();
            if (!report) return;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## \u{1F512} Security Review\n\n${report}`
            });
