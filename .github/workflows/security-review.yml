# =============================================================================
# AI-Powered Security Review on Every PR
# Uses Anthropic's official claude-code-security-review action
# Docs: https://github.com/anthropics/claude-code-security-review
# =============================================================================
# SETUP:
#   1. Add ANTHROPIC_API_KEY to repo Settings → Secrets → Actions
#   2. Drop this file into .github/workflows/
#   3. That's it — every PR now gets a security review comment
# =============================================================================

name: "🔒 AI Security Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Prevent parallel reviews on the same PR
concurrency:
  group: security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Check API key is configured
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set. Add it under repo Settings → Secrets → Actions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context

      - name: Run Claude Security Review
        uses: anthropics/claude-code-security-review@0c6a49f1fa56a1d472575da86a94dbc1edb78eda # main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-opus-4-6"
          # Optional: set to true to re-scan every commit (more thorough but noisier)
          direct_push: false
